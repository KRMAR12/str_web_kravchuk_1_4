name: Deploy WhereCrypto to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          python manage.py test

      - name: Build and Push Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          
          docker build -t ${{ secrets.DOCKER_USERNAME }}/wherecrypto:latest .
          
          docker push ${{ secrets.DOCKER_USERNAME }}/wherecrypto:latest